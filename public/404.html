<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting...</title>
  <script>
    // Check if URL starts with /admin
    const path = window.location.pathname;
    if (path.startsWith('/admin')) {
      // Store the original path for React Router
      sessionStorage.setItem('redirectPath', path);
      // Load the app
      window.location.replace('/index.html');
    } else {
      // Everything else goes to download page
      window.location.replace('/download.html');
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
