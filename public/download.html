<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Download Bartendaz Pro</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: radial-gradient(circle at 20% 0%, oklch(0.3 0.05 60) 0%, oklch(0.15 0.02 60) 60%);
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .container {
        max-width: 500px;
        text-align: center;
      }
      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 2rem;
        background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 20px 60px rgba(139, 92, 246, 0.4);
      }
      h1 {
        font-size: 3rem;
        font-weight: 900;
        margin-bottom: 0.5rem;
        letter-spacing: -0.02em;
      }
      p {
        color: rgba(255, 255, 255, 0.7);
        font-size: 1.125rem;
        margin-bottom: 3rem;
      }
      .download-btn {
        display: inline-block;
        background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
        color: #fff;
        padding: 1rem 2.5rem;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 700;
        font-size: 1.125rem;
        box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .download-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 40px rgba(139, 92, 246, 0.4);
      }
      .info {
        margin-top: 2rem;
        font-size: 0.875rem;
        color: rgba(255, 255, 255, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 2h8l4 4v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/>
          <path d="M16 2v4h4"/>
          <path d="M12 18v-6"/>
          <path d="m9 15 3 3 3-3"/>
        </svg>
      </div>
      <h1>Bartendaz Pro</h1>
      <p>Bar POS & Wallet System</p>
      <a href="#" class="download-btn" id="downloadBtn">Download APK</a>
      <div class="info">
        <p>Android 7.0 or higher required</p>
      </div>
    </div>
    <script>
      // You can update this URL to point to your actual APK download link
      document.getElementById('downloadBtn').addEventListener('click', function(e) {
        e.preventDefault();
        alert('APK download link not configured yet. Please add your APK URL to this page.');
      });
    </script>
  </body>
</html>
