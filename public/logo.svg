<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <!-- Matches --gradient-hero: oklch(0.78 0.17 65) → oklch(0.65 0.2 30) -->
      <stop offset="0%"   stop-color="#E8922A"/>
      <stop offset="100%" stop-color="#C0441A"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2A1F0F"/>
      <stop offset="100%" stop-color="#1A1208"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Subtle inner ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#heroGrad)" stroke-width="3" opacity="0.3"/>

  <!-- Big B — centered, bold, gradient fill -->
  <!-- Using a path for a custom thick B shape -->
  <text
    x="256"
    y="330"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="320"
    font-weight="900"
    text-anchor="middle"
    fill="url(#heroGrad)"
    letter-spacing="-10"
  >B</text>

  <!-- "Pro" badge — bottom right, small, elegant -->
  <rect x="310" y="370" width="90" height="34" rx="10" fill="url(#heroGrad)" opacity="0.95"/>
  <text
    x="355"
    y="393"
    font-family="'Arial', 'Helvetica', sans-serif"
    font-size="20"
    font-weight="700"
    text-anchor="middle"
    fill="#1A1208"
    letter-spacing="1"
  >PRO</text>
</svg>
