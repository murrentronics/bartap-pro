<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bartendaz Pro - Admin Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: radial-gradient(circle at 20% 0%, #2d1f3d 0%, #0f0a15 60%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 40px rgba(249, 115, 22, 0.3);
        }
        
        h1 {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            color: #a1a1aa;
            margin-bottom: 50px;
            font-size: 18px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 18px 30px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(249, 115, 22, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(249, 115, 22, 0.5);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        
        .info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
            text-align: left;
        }
        
        .info h3 {
            color: #60a5fa;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .info p {
            color: #a1a1aa;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .info code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #fbbf24;
        }
        
        .status {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.4);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: #4ade80;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🍷</div>
        <h1>Bartendaz Pro</h1>
        <p class="subtitle">Admin Dashboard Launcher</p>
        
        <div class="card">
            <div class="button-group">
                <button class="btn btn-primary" onclick="openLocalDev()">
                    🚀 Open Local Dev Server
                </button>
                <button class="btn btn-secondary" onclick="openProduction()">
                    🌐 Open Production Site
                </button>
            </div>
            
            <div class="info">
                <h3>📋 Quick Start</h3>
                <p><strong>Local Development:</strong></p>
                <p>1. Open terminal in project folder</p>
                <p>2. Run: <code>npm run dev</code></p>
                <p>3. Click "Open Local Dev Server" above</p>
                
                <p style="margin-top: 15px;"><strong>Production:</strong></p>
                <p>Deploy to Cloudflare Pages and update the URL in this file</p>
            </div>
            
            <div class="status" id="status">
                ⚡ Ready to Launch
            </div>
        </div>
    </div>
    
    <script>
        // Update this URL with your Cloudflare Pages deployment URL
        const PRODUCTION_URL = 'https://bartendaz-admin.pages.dev/admin';
        const LOCAL_DEV_URL = 'http://localhost:5173/admin';
        
        function openLocalDev() {
            const status = document.getElementById('status');
            status.textContent = '🔄 Opening local dev server...';
            status.style.background = 'rgba(59, 130, 246, 0.2)';
            status.style.borderColor = 'rgba(59, 130, 246, 0.4)';
            status.style.color = '#60a5fa';
            
            // Try to open local dev server
            const win = window.open(LOCAL_DEV_URL, '_blank');
            
            setTimeout(() => {
                if (!win || win.closed || typeof win.closed == 'undefined') {
                    status.textContent = '⚠️ Make sure dev server is running (npm run dev)';
                    status.style.background = 'rgba(234, 179, 8, 0.2)';
                    status.style.borderColor = 'rgba(234, 179, 8, 0.4)';
                    status.style.color = '#fbbf24';
                } else {
                    status.textContent = '✅ Opened in new tab';
                    status.style.background = 'rgba(34, 197, 94, 0.2)';
                    status.style.borderColor = 'rgba(34, 197, 94, 0.4)';
                    status.style.color = '#4ade80';
                }
            }, 1000);
        }
        
        function openProduction() {
            const status = document.getElementById('status');
            status.textContent = '🌐 Opening production site...';
            status.style.background = 'rgba(59, 130, 246, 0.2)';
            status.style.borderColor = 'rgba(59, 130, 246, 0.4)';
            status.style.color = '#60a5fa';
            
            window.open(PRODUCTION_URL, '_blank');
            
            setTimeout(() => {
                status.textContent = '✅ Opened in new tab';
                status.style.background = 'rgba(34, 197, 94, 0.2)';
                status.style.borderColor = 'rgba(34, 197, 94, 0.4)';
                status.style.color = '#4ade80';
            }, 1000);
        }
        
        // Check if local dev server is running
        fetch(LOCAL_DEV_URL)
            .then(() => {
                const status = document.getElementById('status');
                status.textContent = '✅ Local dev server detected';
            })
            .catch(() => {
                // Dev server not running, that's okay
            });
    </script>
</body>
</html>
