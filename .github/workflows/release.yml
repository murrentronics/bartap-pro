name: Build & Release APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Java setup ──────────────────────────────────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── 3. Node setup ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install JS deps ─────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 5. Build web bundle for Capacitor ─────────────────────────────────
      - name: Build Android web bundle
        run: |
          rm -rf dist/client
          npx cross-env NODE_OPTIONS="--max-old-space-size=4096" vite build --config vite.capacitor.config.ts

      # ── 6. Copy capacitor HTML as index.html ──────────────────────────────
      - name: Fix index.html for Capacitor
        run: cp dist/client/index.capacitor.html dist/client/index.html

      # ── 7. Read version from .env ──────────────────────────────────────────
      - name: Read app version
        id: version
        run: |
          VERSION=$(grep 'VITE_APP_VERSION' .env | sed 's/VITE_APP_VERSION="\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      # ── 8. Copy web assets directly into Android assets folder ────────────
      #    (avoids cap sync which requires Android SDK on the runner)
      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          rm -rf android/app/src/main/assets/public/*
          cp -r dist/client/. android/app/src/main/assets/public/
          # Write capacitor.config.json (gitignored, must be generated)
          node -e "
            const fs = require('fs');
            const cfg = {
              appId: 'com.bartendaz.pro',
              appName: 'Bartendaz Pro',
              webDir: 'dist/client',
              plugins: {
                SplashScreen: { launchShowDuration: 0, launchAutoHide: true, showSpinner: false, backgroundColor: '#000000' },
                Camera: {}, Filesystem: {}, Share: {}, Browser: {}, FileOpener: {}
              },
              android: { backgroundColor: '#000000', captureInput: true, webContentsDebuggingEnabled: false }
            };
            fs.writeFileSync('android/app/src/main/assets/capacitor.config.json', JSON.stringify(cfg, null, 2));
            console.log('capacitor.config.json written');
          "
          # capacitor.plugins.json is committed in the repo — already copied above, do not overwrite

      # ── 9. Fix gradle.properties for CI (remove local Android Studio path) ─
      - name: Fix gradle.properties for CI
        run: sed -i '/org.gradle.java.home/d' android/gradle.properties

      # ── 10. Decode keystore ────────────────────────────────────────────────
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/bartendaz.jks

      # ── 11. Make gradlew executable ───────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 11a. Install Android SDK 36 ───────────────────────────────────────
      - name: Install Android SDK 36
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;35.0.0" 2>/dev/null || \
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;34.0.0"

      # ── 14. Build release APK ─────────────────────────────────────────────
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 15. Find and rename APK ───────────────────────────────────────────
      - name: Rename APK
        run: |
          APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "Found APK: $APK"
          mv "$APK" android/app/build/outputs/apk/release/bartendaz-pro.apk

      # ── 16. Create / update GitHub Release ───────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: ${{ steps.version.outputs.TAG }}
          body: "Bartendaz Pro ${{ steps.version.outputs.TAG }}"
          files: android/app/build/outputs/apk/release/bartendaz-pro.apk
          make_latest: true
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 17. Build web bundle for Safari/browser (iPhone support) ──────────
      - name: Build web bundle
        run: npx cross-env NODE_OPTIONS="--max-old-space-size=4096" vite build --config vite.web.config.ts

      # Copy logo.png into web public folder so PDF exports work
      - name: Copy logo to web public
        run: cp public/logo.png public-web/logo.png

      # Rename index.web.html → index.html so Cloudflare Pages serves it correctly
      - name: Fix web index filename
        run: mv dist/web/index.web.html dist/web/index.html

      # ── 18. Deploy web build to Cloudflare Pages ──────────────────────────
      - name: Deploy to Cloudflare Pages (bartendazpro-web)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/web --project-name=bartendazpro-web --commit-dirty=true
